name: elimu_ai
description: AI study companion for Kenyan students — chat, camera, document reading, quizzes.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management & navigation
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.0

  # Networking
  dio: ^5.7.0

  # Camera & files
  camera: ^0.11.0
  image_picker: ^1.1.2
  image_cropper: ^8.0.2
  file_picker: ^8.1.2

  # Document viewing / OCR
  syncfusion_flutter_pdfviewer: ^27.1.48
  google_mlkit_text_recognition: ^0.13.1

  # Chat UI
  flutter_markdown: ^0.7.4

  # Voice
  speech_to_text: ^7.0.0
  flutter_tts: ^4.1.0

  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.2.2

  # Utils
  cupertino_icons: ^1.0.8
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.13

flutter:
  uses-material-design: true
  assets:
    - assets/
